services:
  # --- MQTT Broker ---
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
    restart: unless-stopped

  # --- TimescaleDB ---
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: solair
      POSTGRES_USER: solair
      POSTGRES_PASSWORD: solair_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solair"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- Backend API + MQTT Ingestion ---
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://solair:solair_dev@timescaledb:5432/solair
      DATABASE_URL_SYNC: postgresql://solair:solair_dev@timescaledb:5432/solair
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MQTT_TOPIC: "solair/#"
    depends_on:
      timescaledb:
        condition: service_healthy
      mosquitto:
        condition: service_started
    restart: unless-stopped

  # --- Frontend ---
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
  mosquitto_data:

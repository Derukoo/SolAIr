; ============================================================
; SolAIr — PlatformIO Configuration
; ============================================================
; Common settings live in [env]. Per-device environments
; inherit from it and only override upload_port.
;
; Build/upload a specific device:
;   pio run -e device_0 -t upload
;   pio run -e device_1 -t upload
;
; Build all devices:
;   pio run
; ============================================================

[env]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

extra_scripts = pre:load_settings.py

lib_deps =
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    claws/BH1750 @ ^1.3.0
    knolleary/PubSubClient @ ^2.8

; --- Device 0 (default: /dev/ttyUSB0) ---
[env:device_0]
upload_port  = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0

; --- Device 1 (/dev/ttyUSB1) ---
[env:device_1]
upload_port  = /dev/ttyUSB1
monitor_port = /dev/ttyUSB1
